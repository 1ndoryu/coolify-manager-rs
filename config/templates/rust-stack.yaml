services:
    rust-app:
        build:
            context: .
            dockerfile: Dockerfile.rust
        volumes:
            - app_data:/app/data
        environment:
            DATABASE_URL: postgres://rust_app:{{DB_PASSWORD}}@postgres:5432/rust_db
            JWT_SECRET: {{JWT_SECRET}}
            RUST_LOG: info
            SERVICE_FQDN_RUSTAPP: {{DOMAIN}}
        depends_on:
            postgres:
                condition: service_healthy
        healthcheck:
            test: ["CMD-SHELL", "test -f /app/app || exit 1"]
            interval: 15s
            timeout: 5s
            retries: 3

    postgres:
        image: postgres:16-alpine
        volumes:
            - pg_data:/var/lib/postgresql/data
        environment:
            POSTGRES_DB: rust_db
            POSTGRES_USER: rust_app
            POSTGRES_PASSWORD: {{DB_PASSWORD}}
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U rust_app -d rust_db"]
            interval: 10s
            timeout: 5s
            retries: 5

volumes:
    app_data:
    pg_data:
