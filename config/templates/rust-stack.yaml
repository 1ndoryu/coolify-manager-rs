services:
    app:
        build:
            context: .
            dockerfile: Dockerfile.rust
            args:
                REPO_URL: {{REPO_URL}}
                BRANCH: {{GLORY_BRANCH}}
                APP_BIN: {{APP_BIN}}
                # [095A-23] Vite reemplaza import.meta.env en build-time, no en runtime.
                VITE_STRIPE_PUBLISHABLE_KEY: $VITE_STRIPE_PUBLISHABLE_KEY
        volumes:
            - app_data:/app/data
            - uploads_data:/app/uploads
        environment:
            # [095A-22] Usar container_name unico evita que el alias generico
            # `postgres` resuelva contra otro stack al compartir redes con Coolify.
            DATABASE_URL: postgres://rust_app:$SERVICE_PASSWORD_POSTGRES@postgres-{{STACK_UUID}}:5432/rust_db
            JWT_SECRET: $SERVICE_PASSWORD_64_JWTSECRET
            RUST_LOG: info
            STATIC_DIR: /app/dist
            HOST: 0.0.0.0
            SERVICE_FQDN_APP: {{DOMAIN}}
        depends_on:
            postgres:
                condition: service_healthy
        healthcheck:
            # [115A-STUDIO-AUTOHEAL] Endpoint liviano y configurable; si la app acepta sockets pero no responde, debe quedar unhealthy.
            test: ["CMD-SHELL", "container_ip=$$(hostname -i | awk '{print $$1}'); curl -sf --max-time 4 http://$${container_ip}:3000{{HEALTH_PATH}} || exit 1"]
            interval: 15s
            timeout: 5s
            retries: 3
            start_period: 30s
        labels:
            - "autoheal=true"
            - "traefik.enable=true"
            - "traefik.http.routers.{{DOMAIN_SLUG}}-https.rule=Host(`{{DOMAIN_CLEAN}}`)"
            - "traefik.http.routers.{{DOMAIN_SLUG}}-https.entryPoints=https"
            - "traefik.http.routers.{{DOMAIN_SLUG}}-https.tls=true"
            - "traefik.http.routers.{{DOMAIN_SLUG}}-https.tls.certresolver=letsencrypt"
            - "traefik.http.routers.{{DOMAIN_SLUG}}-https.service={{DOMAIN_SLUG}}-svc"
            - "traefik.http.routers.{{DOMAIN_SLUG}}-http.rule=Host(`{{DOMAIN_CLEAN}}`)"
            - "traefik.http.routers.{{DOMAIN_SLUG}}-http.entryPoints=http"
            - "traefik.http.routers.{{DOMAIN_SLUG}}-http.middlewares={{DOMAIN_SLUG}}-redirect"
            - "traefik.http.middlewares.{{DOMAIN_SLUG}}-redirect.redirectscheme.scheme=https"
            - "traefik.http.services.{{DOMAIN_SLUG}}-svc.loadbalancer.server.port=3000"
{{EXTRA_DOMAIN_LABELS}}
        restart: unless-stopped

    postgres:
        image: postgres:16-alpine
        container_name: postgres-{{STACK_UUID}}
        volumes:
            - pg_data:/var/lib/postgresql/data
        environment:
            POSTGRES_DB: rust_db
            POSTGRES_USER: rust_app
            POSTGRES_PASSWORD: $SERVICE_PASSWORD_POSTGRES
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U rust_app -d rust_db"]
            interval: 10s
            timeout: 5s
            retries: 5

volumes:
    app_data:
    uploads_data:
    pg_data:
