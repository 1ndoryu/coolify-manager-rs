services:
    wordpress:
        build:
            context: .
            dockerfile_inline: |
                FROM wordpress:php8.2-apache
                RUN apt-get update && apt-get install -y --no-install-recommends \
                    libpq-dev ffmpeg python3 python3-pip python3-venv python3-dev \
                    libsndfile1 libffi-dev git \
                    && docker-php-ext-install pdo_pgsql pgsql \
                    && pecl install redis && docker-php-ext-enable redis \
                    && apt-get clean && rm -rf /var/lib/apt/lists/*
                RUN curl -fsSL https://deb.nodesource.com/setup_20.x | bash - \
                    && apt-get install -y nodejs \
                    && npm install -g npm@latest \
                    && apt-get clean && rm -rf /var/lib/apt/lists/*
                COPY --from=composer:latest /usr/bin/composer /usr/bin/composer
                RUN php -m | grep -E "pdo_pgsql|pgsql|redis" \
                    && ffmpeg -version | head -1 \
                    && python3 --version \
                    && node -v \
                    && composer -V
                # [F12] Entrypoint que auto-repara el tema si desaparece
                RUN printf '#!/bin/bash\n\
                set -e\n\
                THEME_DIR="/var/www/html/wp-content/themes/${GLORY_THEME_NAME:-glorytemplate}"\n\
                if [ -n "${GLORY_THEME_REPO}" ] && [ ! -d "${THEME_DIR}/.git" ]; then\n\
                  echo "[glory-init] Theme missing, auto-installing..."\n\
                  mkdir -p "$(dirname ${THEME_DIR})"\n\
                  git clone --branch "${GLORY_BRANCH:-main}" --single-branch "${GLORY_THEME_REPO}" "${THEME_DIR}" || true\n\
                  if [ -n "${GLORY_LIBRARY_REPO}" ] && [ -d "${THEME_DIR}" ]; then\n\
                    git clone --branch "${GLORY_LIBRARY_BRANCH:-main}" --single-branch "${GLORY_LIBRARY_REPO}" "${THEME_DIR}/Glory" || true\n\
                  fi\n\
                  if [ -d "${THEME_DIR}" ]; then\n\
                    cd "${THEME_DIR}"\n\
                    [ -f composer.json ] && composer install --no-dev --optimize-autoloader --no-interaction 2>&1 || true\n\
                    if [ -f package.json ]; then\n\
                      npm install --no-audit --no-fund 2>&1 || true\n\
                      npm run build 2>&1 || true\n\
                    fi\n\
                    chown -R www-data:www-data "${THEME_DIR}"\n\
                    echo "[glory-init] Theme auto-installed."\n\
                  fi\n\
                fi\n\
                exec docker-entrypoint.sh "$@"\n' > /usr/local/bin/glory-entrypoint.sh && \
                    chmod +x /usr/local/bin/glory-entrypoint.sh
                ENTRYPOINT ["glory-entrypoint.sh"]
                CMD ["apache2-foreground"]
        volumes:
            - wordpress_data:/var/www/html
            - uploads_data:/var/www/html/wp-content/uploads
        environment:
            WORDPRESS_DB_HOST: mariadb
            WORDPRESS_DB_USER: manager
            WORDPRESS_DB_PASSWORD: {{DB_PASSWORD}}
            WORDPRESS_DB_NAME: wordpress
            KAMPLES_PG_HOST: postgres
            KAMPLES_PG_PORT: 5432
            KAMPLES_PG_DBNAME: kamples
            KAMPLES_PG_USER: kamples_app
            KAMPLES_PG_PASSWORD: {{PG_PASSWORD}}
            FFMPEG_PATH: /usr/bin/ffmpeg
            FFPROBE_PATH: /usr/bin/ffprobe
            KAMPLES_WS_INTERNAL_SECRET: {{WS_INTERNAL_SECRET}}
            KAMPLES_WS_TICKET_SECRET: {{WS_TICKET_SECRET}}
            KAMPLES_WS_NOTIFY_URL: http://websocket:8080/notify
            KAMPLES_WS_PUBLIC_URL: {{WS_PUBLIC_URL}}
            DEV: "FALSE"
            LOCAL: "FALSE"
            WP_DEBUG: "FALSE"
            KAMPLES_REDIS_HOST: redis
            KAMPLES_REDIS_PORT: "6379"
            SERVICE_FQDN_WORDPRESS: {{DOMAIN}}
            GLORY_THEME_REPO: {{GLORY_THEME_REPO}}
            GLORY_LIBRARY_REPO: {{GLORY_LIBRARY_REPO}}
            GLORY_BRANCH: {{GLORY_BRANCH}}
            GLORY_LIBRARY_BRANCH: {{GLORY_LIBRARY_BRANCH}}
            GLORY_THEME_NAME: {{GLORY_THEME_NAME}}
        depends_on:
            postgres:
                condition: service_healthy
            mariadb:
                condition: service_healthy
            websocket:
                condition: service_healthy
            redis:
                condition: service_healthy
        # [F5] Labels Traefik explícitos para dominio correcto
        labels:
            - 'traefik.enable=true'
            - 'traefik.http.routers.{{DOMAIN_SLUG}}-https.rule=Host(`{{DOMAIN_CLEAN}}`)'
            - 'traefik.http.routers.{{DOMAIN_SLUG}}-https.entrypoints=https'
            - 'traefik.http.routers.{{DOMAIN_SLUG}}-https.tls=true'
            - 'traefik.http.routers.{{DOMAIN_SLUG}}-https.tls.certresolver=letsencrypt'
            - 'traefik.http.routers.{{DOMAIN_SLUG}}-http.rule=Host(`{{DOMAIN_CLEAN}}`)'
            - 'traefik.http.routers.{{DOMAIN_SLUG}}-http.entrypoints=http'
            - 'traefik.http.routers.{{DOMAIN_SLUG}}-http.middlewares={{DOMAIN_SLUG}}-redirect'
            - 'traefik.http.middlewares.{{DOMAIN_SLUG}}-redirect.redirectscheme.scheme=https'
            - 'traefik.http.services.{{DOMAIN_SLUG}}.loadbalancer.server.port=80'

    mariadb:
        image: mariadb:10.11
        volumes:
            - db_data:/var/lib/mysql
        environment:
            MYSQL_ROOT_PASSWORD: {{ROOT_PASSWORD}}
            MYSQL_DATABASE: wordpress
            MYSQL_USER: manager
            MYSQL_PASSWORD: {{DB_PASSWORD}}
        healthcheck:
            test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
            interval: 10s
            timeout: 5s
            retries: 5

    postgres:
        image: pgvector/pgvector:pg18
        volumes:
            - pg_data:/var/lib/postgresql/data
            - ./init-postgres.sh:/docker-entrypoint-initdb.d/init.sh
        environment:
            POSTGRES_DB: kamples
            POSTGRES_USER: kamples_app
            POSTGRES_PASSWORD: {{PG_PASSWORD}}
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U kamples_app -d kamples"]
            interval: 10s
            timeout: 5s
            retries: 5

    websocket:
        build:
            context: .
            dockerfile_inline: |
                FROM oven/bun:1
                WORKDIR /app
                RUN bun -e "const r=await fetch('https://raw.githubusercontent.com/1ndoryu/glorytemplate/{{GLORY_BRANCH}}/websocket-server/server.ts');if(!r.ok)throw new Error('Fetch server.ts failed: '+r.status);await Bun.write('server.ts',await r.text())"
                EXPOSE 8080
                CMD ["bun", "run", "server.ts"]
        environment:
            KAMPLES_WS_INTERNAL_SECRET: {{WS_INTERNAL_SECRET}}
            KAMPLES_WS_TICKET_SECRET: {{WS_TICKET_SECRET}}
            WS_PORT: "8080"
            SERVICE_FQDN_WEBSOCKET: {{WS_DOMAIN}}
        healthcheck:
            test: ["CMD", "bun", "-e", "fetch('http://localhost:8080/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
            interval: 30s
            timeout: 5s
            retries: 3
        restart: unless-stopped

    redis:
        image: redis:7-alpine
        command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --save ""
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 3
        restart: unless-stopped

volumes:
    wordpress_data:
    uploads_data:
    db_data:
    pg_data:
