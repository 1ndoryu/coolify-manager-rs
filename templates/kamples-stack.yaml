services:
    wordpress:
        build:
            context: .
            dockerfile_inline: |
                FROM wordpress:php8.2-apache
                RUN apt-get update && apt-get install -y --no-install-recommends \
                    libpq-dev ffmpeg python3 python3-pip python3-venv python3-dev \
                    libsndfile1 libffi-dev git \
                    && docker-php-ext-install pdo_pgsql pgsql \
                    && apt-get clean && rm -rf /var/lib/apt/lists/*
                RUN curl -fsSL https://deb.nodesource.com/setup_20.x | bash - \
                    && apt-get install -y nodejs \
                    && npm install -g npm@latest \
                    && apt-get clean && rm -rf /var/lib/apt/lists/*
                COPY --from=composer:latest /usr/bin/composer /usr/bin/composer
                RUN php -m | grep -E "pdo_pgsql|pgsql" \
                    && ffmpeg -version | head -1 \
                    && python3 --version \
                    && node -v \
                    && composer -V
        volumes:
            - wordpress_data:/var/www/html
            - uploads_data:/var/www/html/wp-content/uploads
        environment:
            WORDPRESS_DB_HOST: mariadb
            WORDPRESS_DB_USER: manager
            WORDPRESS_DB_PASSWORD: {{DB_PASSWORD}}
            WORDPRESS_DB_NAME: wordpress
            KAMPLES_PG_HOST: postgres
            KAMPLES_PG_PORT: 5432
            KAMPLES_PG_DBNAME: kamples
            KAMPLES_PG_USER: kamples_app
            KAMPLES_PG_PASSWORD: {{PG_PASSWORD}}
            FFMPEG_PATH: /usr/bin/ffmpeg
            FFPROBE_PATH: /usr/bin/ffprobe
            KAMPLES_WS_INTERNAL_SECRET: {{WS_INTERNAL_SECRET}}
            KAMPLES_WS_TICKET_SECRET: {{WS_TICKET_SECRET}}
            KAMPLES_WS_NOTIFY_URL: http://websocket:8080/notify
            KAMPLES_WS_PUBLIC_URL: {{WS_PUBLIC_URL}}
            DEV: "FALSE"
            LOCAL: "FALSE"
            WP_DEBUG: "FALSE"
            SERVICE_FQDN_WORDPRESS: {{DOMAIN}}
        depends_on:
            postgres:
                condition: service_healthy
            mariadb:
                condition: service_healthy
            websocket:
                condition: service_healthy

    mariadb:
        image: mariadb:10.11
        volumes:
            - db_data:/var/lib/mysql
        environment:
            MYSQL_ROOT_PASSWORD: {{ROOT_PASSWORD}}
            MYSQL_DATABASE: wordpress
            MYSQL_USER: manager
            MYSQL_PASSWORD: {{DB_PASSWORD}}
        healthcheck:
            test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
            interval: 10s
            timeout: 5s
            retries: 5

    postgres:
        image: pgvector/pgvector:pg18
        volumes:
            - pg_data:/var/lib/postgresql/data
            - ./init-postgres.sh:/docker-entrypoint-initdb.d/init.sh
        environment:
            POSTGRES_DB: kamples
            POSTGRES_USER: kamples_app
            POSTGRES_PASSWORD: {{PG_PASSWORD}}
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U kamples_app -d kamples"]
            interval: 10s
            timeout: 5s
            retries: 5

    websocket:
        build:
            context: .
            dockerfile_inline: |
                FROM oven/bun:1
                WORKDIR /app
                RUN bun -e "const r=await fetch('https://raw.githubusercontent.com/1ndoryu/glorytemplate/{{GLORY_BRANCH}}/websocket-server/server.ts');if(!r.ok)throw new Error('Fetch server.ts failed: '+r.status);await Bun.write('server.ts',await r.text())"
                EXPOSE 8080
                CMD ["bun", "run", "server.ts"]
        environment:
            KAMPLES_WS_INTERNAL_SECRET: {{WS_INTERNAL_SECRET}}
            KAMPLES_WS_TICKET_SECRET: {{WS_TICKET_SECRET}}
            WS_PORT: "8080"
            SERVICE_FQDN_WEBSOCKET: {{WS_DOMAIN}}
        healthcheck:
            test: ["CMD", "bun", "-e", "fetch('http://localhost:8080/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
            interval: 30s
            timeout: 5s
            retries: 3
        restart: unless-stopped

volumes:
    wordpress_data:
    uploads_data:
    db_data:
    pg_data:
