# [044A-1] Template Docker Compose para stack Rust (Axum + PostgreSQL).
# Coolify construye la imagen inline clonando desde GitHub.
# Variables del template engine ({{VAR}}): DOMAIN, GLORY_BRANCH, REPO_URL
# Variables de Coolify (${VAR}): SERVICE_PASSWORD_POSTGRES, SERVICE_PASSWORD_64_JWTSECRET — resueltas por Coolify en deploy.
# El seed binary se incluye para poder ejecutar datos de prueba post-deploy.

services:
    app:
        build:
            context: .
            dockerfile_inline: |
                # syntax=docker/dockerfile:1
                # --- Stage 1: Build backend Rust ---
                FROM rust:1-bookworm AS backend-builder
                WORKDIR /app
                RUN apt-get update && apt-get install -y --no-install-recommends git && rm -rf /var/lib/apt/lists/*
                RUN git clone --branch {{GLORY_BRANCH}} --depth 1 --recurse-submodules {{REPO_URL}} .
                ENV SQLX_OFFLINE=true
                RUN --mount=type=cache,target=/usr/local/cargo/registry --mount=type=cache,target=/usr/local/cargo/git cargo build --release --bin glory-backend --bin seed && cp /app/target/release/glory-backend /app/target/release/seed /usr/local/bin/
                # --- Stage 2: Build frontend React ---
                FROM node:20-slim AS frontend-builder
                WORKDIR /app
                RUN apt-get update && apt-get install -y --no-install-recommends git ca-certificates && rm -rf /var/lib/apt/lists/*
                RUN git clone --branch {{GLORY_BRANCH}} --depth 1 --recurse-submodules {{REPO_URL}} .
                WORKDIR /app/glory-rs
                RUN --mount=type=cache,target=/root/.npm npm install --ignore-scripts
                WORKDIR /app/frontend
                RUN --mount=type=cache,target=/root/.npm npm ci --ignore-scripts
                RUN npm run build
                # --- Stage 3: Runtime ---
                FROM debian:bookworm-slim
                RUN apt-get update && apt-get install -y --no-install-recommends ca-certificates curl && rm -rf /var/lib/apt/lists/*
                WORKDIR /app
                COPY --from=backend-builder /usr/local/bin/glory-backend /app/glory-backend
                COPY --from=backend-builder /usr/local/bin/seed /app/seed
                COPY --from=frontend-builder /app/frontend/dist /app/static
                COPY --from=backend-builder /app/migrations/ /app/migrations/
                COPY --from=backend-builder /app/content/ /app/content/
                RUN mkdir -p /app/uploads/content
                ENV HOST=0.0.0.0
                ENV PORT=3000
                EXPOSE 3000
                CMD ["/app/glory-backend"]
        environment:
            # [25A-DB-AUTH] Usar container_name único (postgres-{uuid}) para evitar colisión DNS en red compartida coolify
            DATABASE_URL: 'postgres://rust_app:${SERVICE_PASSWORD_POSTGRES}@postgres-{{STACK_UUID}}:5432/rust_db'
            JWT_SECRET: '${SERVICE_PASSWORD_64_JWTSECRET}'
            HOST: '0.0.0.0'
            PORT: '3000'
            STATIC_DIR: /app/static
            DEMO_MODE: 'true'
            APP_URL: '{{DOMAIN}}'
            SERVICE_FQDN_APP_3000: '{{DOMAIN_CLEAN}}'
        labels:
            # [115A-STUDIO-AUTOHEAL] Docker no reinicia contenedores unhealthy; el sentinel/autoheal del VPS necesita esta etiqueta.
            - 'autoheal=true'
        depends_on:
            postgres:
                condition: service_healthy
        volumes:
            - '/data/uploads/{{SITE_NAME}}:/app/uploads'
        healthcheck:
            # [115A-STUDIO-AUTOHEAL] Usar endpoint liviano configurable; /swagger-ui/ puede colgar y dejar la app aceptando sockets sin responder.
            test: ['CMD-SHELL', 'container_ip=$$(hostname -i | awk ''{print $$1}''); curl -sf --max-time 4 http://$${container_ip}:3000{{HEALTH_PATH}} || exit 1']
            interval: 30s
            timeout: 10s
            retries: 5
            start_period: 180s
        restart: unless-stopped

    postgres:
        image: 'postgres:16-alpine'
        # [25A-DB-AUTH] container_name explícito = nombre único en red coolify, evita resolución ambigua
        container_name: 'postgres-{{STACK_UUID}}'
        volumes:
            - 'pg_data:/var/lib/postgresql/data'
        environment:
            POSTGRES_DB: rust_db
            POSTGRES_USER: rust_app
            POSTGRES_PASSWORD: '${SERVICE_PASSWORD_POSTGRES}'
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U rust_app -d rust_db']
            interval: 10s
            timeout: 5s
            retries: 5

    rust-app:
        image: 'busybox:latest'
        command: ['sh', '-c', 'echo rust-app placeholder && sleep infinity']
        restart: 'no'

volumes:
    pg_data:
